<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GemiOS AEGIS Hypervisor v53.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/2.4.0/purify.min.js"></script>
    <style>
        :root { --gemi-green: #38ef7d; --gemi-blue: #0078d7; }
        body { background: #000; color: var(--gemi-green); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        #aegis-ui { padding: 30px; height: 100vh; display: flex; flex-direction: column; transition: opacity 1s; }
        .log-entry { margin-bottom: 5px; font-size: 13px; border-left: 2px solid #222; padding-left: 10px; }
        .stat-line { color: #fff; font-weight: bold; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .loading-pulse { animation: pulse 2s infinite; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div id="aegis-ui">
        <div style="font-size: 24px; font-weight: 900; letter-spacing: 5px;" class="loading-pulse">AEGIS HYPERVISOR v53.0</div>
        <div style="margin-bottom: 20px; opacity: 0.6;">Hardware Abstraction Layer & Real-time Runtime</div>
        <div id="boot-log" style="flex-grow: 1; overflow-y: auto;"></div>
        <div id="telemetry" style="border-top: 1px solid #333; padding-top: 10px; display: flex; gap: 40px; font-size: 11px;">
            <span>VFS: <b id="stat-vfs">OFFLINE</b></span>
            <span>CLOCK: <b id="stat-clock">--:--</b></span>
            <span>MATH KERNEL: <b id="stat-math">READY</b></span>
        </div>
    </div>

    <script>
        const bootLog = document.getElementById('boot-log');
        const log = (msg, color=null) => {
            const div = document.createElement('div');
            div.className = 'log-entry';
            if(color) div.style.color = color;
            div.innerHTML = `[${new Date().toLocaleTimeString()}] > ${msg}`;
            bootLog.appendChild(div);
            bootLog.scrollTop = bootLog.scrollHeight;
        };

        // ==========================================
        // 🛡️ THE AEGIS RUNTIME ENGINE
        // ==========================================
        window.Aegis = {
            version: "53.0.0-PROTOTYPE",
            bootTarget: localStorage.getItem('GemiOS_Boot_Target') || 'MODERN',
            
            // 1. MATH KERNEL (Complex Equation Support)
            Math: {
                eval: (formula, vars = {}) => {
                    try {
                        const keys = Object.keys(vars);
                        const vals = Object.values(vars);
                        return new Function(...keys, `return ${formula}`)(...vals);
                    } catch(e) { return 0; }
                },
                vector: (x, y) => ({ x, y, add: (v) => Aegis.Math.vector(x + v.x, y + v.y) })
            },

            // 2. GLOBAL REFRESH LOOP (60FPS Heartbeat)
            Loop: {
                subs: [],
                start: function() {
                    const tick = (t) => {
                        this.subs.forEach(s => s(t));
                        requestAnimationFrame(tick);
                    };
                    requestAnimationFrame(tick);
                    log("Aegis Master Loop Engaged (60FPS)", "#38ef7d");
                },
                subscribe: function(fn) { this.subs.push(fn); }
            },

            // 3. VFS INITIALIZATION (Hardware Access)
            initVFS: async function() {
                log("Probing NVRAM Partitions...");
                return new Promise((res) => {
                    const req = indexedDB.open('GemiOS_Fs', 5);
                    req.onupgradeneeded = e => {
                        const db = e.target.result;
                        if(!db.objectStoreNames.contains('nodes')) db.createObjectStore('nodes', {keyPath: 'path'});
                        log("Schema v5 Applied to GemiOS_Fs", "#ffb400");
                    };
                    req.onsuccess = e => {
                        window.Gemi_DB = e.target.result;
                        document.getElementById('stat-vfs').innerText = "ONLINE";
                        log("NVRAM Handshake Complete.", "#38ef7d");
                        res(true);
                    };
                });
            }
        };

        // ==========================================
        // 🚀 THE AEGIS BOOT SEQUENCE
        // ==========================================
        async function initiateSystem() {
            Aegis.Loop.start();
            await Aegis.initVFS();
            
            log(`System Mode: ${Aegis.bootTarget}`);
            
            let fileToLoad = "kernel.js"; // Default
            if (Aegis.bootTarget === 'LEGACY_V49') fileToLoad = "kernel-beta.js";
            if (Aegis.bootTarget === 'NET_CONFIG') fileToLoad = "legacy-BIOS.js";

            log(`Fetching Payload: ${fileToLoad}...`);
            
            try {
                const timestamp = Date.now();
                const res = await fetch(`./${fileToLoad}?t=${timestamp}`);
                if(!res.ok) throw new Error();
                const code = await res.text();
                
                log("Binary Integrity Verified. Handoff in 1000ms...", "#fff");
                
                setTimeout(() => {
                    document.getElementById('aegis-ui').style.opacity = '0';
                    setTimeout(() => {
                        // We do NOT wipe document.body, as we want to keep the canvas 
                        // and the Aegis object alive for the kernel to use!
                        eval(code);
                    }, 1000);
                }, 1000);
            } catch(e) {
                log("CRITICAL: System Fetch Failed. Reverting to Modern...", "#ff4d4d");
                localStorage.setItem('GemiOS_Boot_Target', 'MODERN');
                setTimeout(() => location.reload(), 2000);
            }
        }

        // Telemetry Update
        setInterval(() => {
            document.getElementById('stat-clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        window.onload = initiateSystem;
    </script>
</body>
</html>
