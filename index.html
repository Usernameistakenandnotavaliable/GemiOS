<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GemiOS BIOS</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * ws: wss:;">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/2.4.0/purify.min.js"></script>

    <style>
        body { background: #000; color: #38ef7d; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; box-sizing: border-box; }
        #post-screen { white-space: pre-wrap; font-size: 16px; line-height: 1.5; }
    </style>
</head>
<body>
    <div id="post-screen">GemiOS Cloud Hypervisor [Version 50.0.0]
(c) 2026 GemiOS Systems. All rights reserved.

Memory Test: 10485760K OK... Initializing...</div>

    <script>
        const log = (msg) => document.getElementById('post-screen').innerHTML += "\n" + msg;

        async function boot() {
            log("Searching for System Kernel...");
            
            // Try loading from GitHub directly to avoid local 404 confusion
            const cloudUrl = "https://raw.githubusercontent.com/Usernameistakenandnotavaliable/GemiOS/refs/heads/main/kernel.js?t=" + Date.now();
            
            try {
                let r = await fetch(cloudUrl, { cache: "no-store" });
                if(r.ok) {
                    let code = await r.text();
                    log("Kernel OK. Handing over execution...");
                    setTimeout(() => { eval(code); }, 500);
                } else { throw new Error(); }
            } catch(e) {
                log("<span style='color:red'>BOOT FAILURE: Kernel not found on Cloud.</span>");
            }
        }

        setTimeout(boot, 1000);
    </script>
</body>
</html>
