<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GemiOS BIOS</title>

    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self' https://cdnjs.cloudflare.com;
                   script-src 'self' 'unsafe-eval' 'unsafe-inline' https://cdnjs.cloudflare.com;
                   style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
                   font-src 'self' https://fonts.gstatic.com;
                   object-src 'none';
                   img-src 'self' data: blob: https:;
                   connect-src https://raw.githubusercontent.com ws://127.0.0.1:5500 ws://localhost:5500 http://127.0.0.1:5500 https://cdnjs.cloudflare.com">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/2.4.0/purify.min.js"></script>

    <style>
        body { background: #000; color: #38ef7d; font-family: 'Courier New', Courier, monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; padding: 20px; box-sizing: border-box; }
        #post-screen { white-space: pre-wrap; font-size: 16px; line-height: 1.5; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="post-screen">
GemiOS Cloud Hypervisor [Version 50.0.0]
(c) 2026 GemiOS Systems. All rights reserved.

Memory Test: 10485760K OK
Initializing Bootloader...

<span class="blink">_</span>
    </div>

    <script>
        // === THE BIOS BOOTLOADER ===
        let bootTimeout;
        let biosOpen = false;
        let postEl = document.getElementById('post-screen');

        setTimeout(() => {
            if(!biosOpen) postEl.innerHTML = postEl.innerHTML.replace('<span class="blink">_</span>', 'Press [F2] to enter Megatrends Setup Utility.<br><br><span class="blink">_</span>');
        }, 800);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'F2' && !biosOpen) {
                biosOpen = true;
                clearTimeout(bootTimeout);
                postEl.innerHTML = `
=== MEGATRENDS BIOS UTILITY ===

1. Continue Boot Sequence
2. Wipe Virtual Disk (Format NVRAM)
3. Flush OS Cache (Clear Stale Linker Data)

Press 1, 2, or 3 to select.
`;
                document.addEventListener('keydown', handleBiosInput);
            }
        });

        function handleBiosInput(e) {
            if(e.key === '1') {
                document.removeEventListener('keydown', handleBiosInput);
                postEl.innerHTML += '\nResuming boot...';
                loadKernel();
            } else if(e.key === '2') {
                indexedDB.deleteDatabase('GemiOS_Fs');
                postEl.innerHTML += '\n<span style="color:#ffb400">Virtual Disk Formatted. Rebooting...</span>';
                setTimeout(()=>location.reload(), 1500);
            } else if(e.key === '3') {
                localStorage.clear();
                postEl.innerHTML += '\n<span style="color:#ffb400">System Cache Flushed. Rebooting...</span>';
                setTimeout(()=>location.reload(), 1500);
            }
        }

        async function loadKernel() {
            let cachedKernel = localStorage.getItem('GemiOS_Cache_Kernel');
            postEl.innerHTML += '\nFetching GemiOS Kernel via TCP/IP...\n';
            try {
                let r = await fetch("https://raw.githubusercontent.com/Usernameistakenandnotavaliable/GemiOS/main/kernel.js?t=" + Date.now());
                if(r.ok) {
                    let code = await r.text();
                    localStorage.setItem('GemiOS_Cache_Kernel', code);
                    postEl.innerHTML += 'Kernel OK. Handing over execution to OS...';
                    setTimeout(() => eval(code), 500);
                } else {
                    if(cachedKernel) { postEl.innerHTML += 'Network Offline. Booting from Cache...'; setTimeout(() => eval(cachedKernel), 500); }
                    else postEl.innerHTML += '<span style="color:red">FATAL: Kernel not found and no cache exists. SYSTEM HALTED.</span>';
                }
            } catch(err) {
                if(cachedKernel) { postEl.innerHTML += 'Network Offline. Booting from Cache...'; setTimeout(() => eval(cachedKernel), 500); }
                else postEl.innerHTML += '<span style="color:red">FATAL: Network error and no cache exists. SYSTEM HALTED.</span>';
            }
        }

        bootTimeout = setTimeout(() => {
            if(!biosOpen) loadKernel();
        }, 2000);
    </script>
</body>
</html>
