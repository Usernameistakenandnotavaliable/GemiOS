<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GemiOS v18.0 - ISO Edition</title>
    <style>
        /* [Styles from previous versions included here for consistency] */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: black; color: white; }
        #desktop { width: 100vw; height: 100vh; background: linear-gradient(135deg, #004e92, #000428); background-size: cover; position: absolute; opacity: 0; transition: opacity 1s; pointer-events: none; }
        .window { position: absolute; background: rgba(255,255,255,0.9); border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: flex; flex-direction: column; color: black; min-width: 200px; min-height: 150px; }
        .title-bar { padding: 8px; background: rgba(0,0,0,0.05); cursor: grab; display: flex; justify-content: space-between; font-weight: bold; }
        .close-btn { background: #ff4d4d; border: none; color: white; cursor: pointer; border-radius: 3px; }
        /* Settings Specific */
        .upd-box { background: #f0f0f0; padding: 15px; border-radius: 5px; border: 1px solid #ccc; margin-top: 10px; }
        .av-status-good { color: #28a745; font-weight: bold; }
        .av-status-bad { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

<div id="desktop">
    <div onclick="openSettings()" style="cursor:pointer; padding:20px;">⚙️ Settings</div>
    <div onclick="openGemiGuard()" style="cursor:pointer; padding:20px;">🛡️ GemiGuard</div>
    <div id="window-container"></div>
</div>

<script>
    const CURRENT_VERSION = "18.0.0";
    const GITHUB_REPO = "https://api.github.com/repos/YOUR_USER/YOUR_REPO/releases/latest";

    // --- STEP 3: ADVANCED SETTINGS & GITHUB UPDATER ---
    function openSettings() {
        const content = `
            <div style="padding:10px;">
                <h3>GemiSys Control Panel</h3>
                <p>System Version: <b>${CURRENT_VERSION}</b></p>
                <div class="upd-box">
                    <div id="upd-status">System is currently up to date.</div>
                    <button onclick="checkUpdates()" style="margin-top:10px; padding:5px 15px;">Check GitHub Repository</button>
                </div>
                <hr>
                <button onclick="location.reload()" style="background:#444; color:white; padding:10px; border:none; width:100%; cursor:pointer;">Restart GemiOS</button>
            </div>
        `;
        createWindow("Settings", content, 400, 450, "sys_settings");
    }

    async function checkUpdates() {
        const status = document.getElementById('upd-status');
        status.innerText = "Connecting to GitHub API...";
        try {
            const response = await fetch(GITHUB_REPO);
            const data = await response.json();
            const latest = data.tag_name;

            if (latest !== CURRENT_VERSION) {
                status.innerHTML = `<span style="color:green;">New Version Available: ${latest}</span><br>Please download the new ISO from the repository.`;
            } else {
                status.innerText = "You are running the latest GemiOS build.";
            }
        } catch (e) {
            status.innerText = "Error: Repository unreachable. Check network.";
        }
    }

    // --- STEP 4: GEMIGUARD ANTIVIRUS ---
    let knownGlobals = Object.keys(window); // Capture safe state at boot

    function openGemiGuard() {
        const content = `
            <div style="padding:10px;">
                <h3>🛡️ GemiGuard Real-time Protection</h3>
                <p id="av-log">Status: <span class="av-status-good">System Secure</span></p>
                <button onclick="runAVScan()" style="width:100%; padding:10px; cursor:pointer;">Deep Scan System Memory</button>
                <div id="scan-results" style="margin-top:10px; font-family:monospace; font-size:11px; background:#eee; height:100px; overflow-y:auto;"></div>
            </div>
        `;
        createWindow("GemiGuard AV", content, 400, 350, "sys_av");
    }

    function runAVScan() {
        const log = document.getElementById('scan-results');
        const status = document.getElementById('av-log');
        log.innerHTML = "Initializing scan...<br>";
        
        // Scan for "Foreign Objects" in window memory
        setTimeout(() => {
            const currentGlobals = Object.keys(window);
            const threats = currentGlobals.filter(key => !knownGlobals.includes(key));
            
            if (threats.length > 0) {
                status.innerHTML = `Status: <span class="av-status-bad">Threat Detected</span>`;
                log.innerHTML += `CRITICAL: Unauthorized global objects found: ${threats.join(', ')}<br>`;
                log.innerHTML += `ACTION: Suggesting immediate restart.`;
            } else {
                log.innerHTML += "Scan Complete. 0 Threats found.<br>No registry anomalies detected.";
            }
        }, 1500);
    }

    // [Window Management logic from previous versions goes here]
</script>
</body>
</html>
